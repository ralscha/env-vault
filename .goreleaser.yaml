version: 2

project_name: env-vault

builds:
  - id: env-vault
    main: ./cmd/cli
    binary: env-vault
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: binaries
    ids:
      - env-vault
    formats:
      - tar.gz
    name_template: '{{ trimsuffix .Binary ".exe" }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

release:
  prerelease: auto

changelog:
  sort: asc